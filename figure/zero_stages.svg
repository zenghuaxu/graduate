<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:46px;font-weight:700;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:24px;fill:#475569}
      .card-title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:32px;font-weight:700;fill:#111827}
      .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:20px;fill:#475569}
      .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:21px;font-weight:600;fill:#1f2937}
      .formula{font-family:"Cambria Math","Times New Roman",serif;font-size:28px;font-weight:700;fill:#111827}
      .chip{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:20px;font-weight:600;fill:#0f172a}
      .rank{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#64748b}
    </style>
  </defs>

  <rect width="1800" height="900" fill="url(#bg)"/>
  <text x="90" y="86" class="title">ZeRO 数据并行状态分片</text>
  <text x="90" y="128" class="subtitle">从复制完整模型状态，到按数据并行 rank 摊薄参数、梯度与优化器状态</text>

  <g transform="translate(78 172)">
    <rect x="0" y="0" width="390" height="610" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="34" y="58" class="card-title">传统 DP</text>
    <text x="34" y="94" class="small">每张卡保存完整状态</text>
    <text x="34" y="560" class="formula">16Ψ</text>
    <text x="115" y="560" class="small">/ rank</text>
    <g transform="translate(34 132)">
      <text x="0" y="0" class="rank">Rank 0</text>
      <text x="184" y="0" class="rank">Rank 1</text>
      <g transform="translate(0 28)">
        <rect x="0" y="0" width="150" height="70" rx="12" fill="#2563eb" opacity=".78"/>
        <rect x="0" y="82" width="150" height="70" rx="12" fill="#16a34a" opacity=".78"/>
        <rect x="0" y="164" width="150" height="118" rx="12" fill="#f97316" opacity=".78"/>
        <text x="50" y="43" class="chip" fill="#fff">参数</text>
        <text x="50" y="125" class="chip" fill="#fff">梯度</text>
        <text x="42" y="229" class="chip" fill="#fff">优化器</text>
      </g>
      <g transform="translate(184 28)">
        <rect x="0" y="0" width="150" height="70" rx="12" fill="#2563eb" opacity=".78"/>
        <rect x="0" y="82" width="150" height="70" rx="12" fill="#16a34a" opacity=".78"/>
        <rect x="0" y="164" width="150" height="118" rx="12" fill="#f97316" opacity=".78"/>
        <text x="50" y="43" class="chip" fill="#fff">参数</text>
        <text x="50" y="125" class="chip" fill="#fff">梯度</text>
        <text x="42" y="229" class="chip" fill="#fff">优化器</text>
      </g>
    </g>
  </g>

  <g transform="translate(512 172)">
    <rect x="0" y="0" width="390" height="610" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="34" y="58" class="card-title">ZeRO-1</text>
    <text x="34" y="94" class="small">优化器状态分片</text>
    <text x="34" y="560" class="formula">4Ψ + 12Ψ / N<tspan baseline-shift="sub" font-size="18">d</tspan></text>
    <g transform="translate(34 132)">
      <text x="0" y="0" class="rank">Rank 0</text>
      <text x="184" y="0" class="rank">Rank 1</text>
      <g transform="translate(0 28)">
        <rect x="0" y="0" width="150" height="70" rx="12" fill="#2563eb" opacity=".78"/>
        <rect x="0" y="82" width="150" height="70" rx="12" fill="#16a34a" opacity=".78"/>
        <rect x="0" y="164" width="150" height="118" rx="12" fill="#f97316" opacity=".28"/>
        <rect x="0" y="164" width="75" height="118" rx="12" fill="#f97316" opacity=".88"/>
        <text x="50" y="43" class="chip" fill="#fff">参数</text>
        <text x="50" y="125" class="chip" fill="#fff">梯度</text>
        <text x="22" y="229" class="chip" fill="#fff">O0</text>
      </g>
      <g transform="translate(184 28)">
        <rect x="0" y="0" width="150" height="70" rx="12" fill="#2563eb" opacity=".78"/>
        <rect x="0" y="82" width="150" height="70" rx="12" fill="#16a34a" opacity=".78"/>
        <rect x="0" y="164" width="150" height="118" rx="12" fill="#f97316" opacity=".28"/>
        <rect x="75" y="164" width="75" height="118" rx="12" fill="#f97316" opacity=".88"/>
        <text x="50" y="43" class="chip" fill="#fff">参数</text>
        <text x="50" y="125" class="chip" fill="#fff">梯度</text>
        <text x="98" y="229" class="chip" fill="#fff">O1</text>
      </g>
    </g>
  </g>

  <g transform="translate(946 172)">
    <rect x="0" y="0" width="390" height="610" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="34" y="58" class="card-title">ZeRO-2</text>
    <text x="34" y="94" class="small">优化器 + 梯度分片</text>
    <text x="34" y="560" class="formula">2Ψ + 14Ψ / N<tspan baseline-shift="sub" font-size="18">d</tspan></text>
    <g transform="translate(34 132)">
      <text x="0" y="0" class="rank">Rank 0</text>
      <text x="184" y="0" class="rank">Rank 1</text>
      <g transform="translate(0 28)">
        <rect x="0" y="0" width="150" height="70" rx="12" fill="#2563eb" opacity=".78"/>
        <rect x="0" y="82" width="150" height="70" rx="12" fill="#16a34a" opacity=".28"/>
        <rect x="0" y="82" width="75" height="70" rx="12" fill="#16a34a" opacity=".88"/>
        <rect x="0" y="164" width="150" height="118" rx="12" fill="#f97316" opacity=".28"/>
        <rect x="0" y="164" width="75" height="118" rx="12" fill="#f97316" opacity=".88"/>
        <text x="50" y="43" class="chip" fill="#fff">参数</text>
        <text x="22" y="125" class="chip" fill="#fff">G0</text>
        <text x="22" y="229" class="chip" fill="#fff">O0</text>
      </g>
      <g transform="translate(184 28)">
        <rect x="0" y="0" width="150" height="70" rx="12" fill="#2563eb" opacity=".78"/>
        <rect x="0" y="82" width="150" height="70" rx="12" fill="#16a34a" opacity=".28"/>
        <rect x="75" y="82" width="75" height="70" rx="12" fill="#16a34a" opacity=".88"/>
        <rect x="0" y="164" width="150" height="118" rx="12" fill="#f97316" opacity=".28"/>
        <rect x="75" y="164" width="75" height="118" rx="12" fill="#f97316" opacity=".88"/>
        <text x="50" y="43" class="chip" fill="#fff">参数</text>
        <text x="98" y="125" class="chip" fill="#fff">G1</text>
        <text x="98" y="229" class="chip" fill="#fff">O1</text>
      </g>
    </g>
  </g>

  <g transform="translate(1380 172)">
    <rect x="0" y="0" width="342" height="610" rx="24" fill="#ffffff" filter="url(#shadow)"/>
    <text x="34" y="58" class="card-title">ZeRO-3</text>
    <text x="34" y="94" class="small">完整模型状态分片</text>
    <text x="34" y="560" class="formula">16Ψ / N<tspan baseline-shift="sub" font-size="18">d</tspan></text>
    <g transform="translate(34 132)">
      <text x="0" y="0" class="rank">Rank 0</text>
      <text x="160" y="0" class="rank">Rank 1</text>
      <g transform="translate(0 28)">
        <rect x="0" y="0" width="130" height="70" rx="12" fill="#2563eb" opacity=".28"/>
        <rect x="0" y="0" width="65" height="70" rx="12" fill="#2563eb" opacity=".88"/>
        <rect x="0" y="82" width="130" height="70" rx="12" fill="#16a34a" opacity=".28"/>
        <rect x="0" y="82" width="65" height="70" rx="12" fill="#16a34a" opacity=".88"/>
        <rect x="0" y="164" width="130" height="118" rx="12" fill="#f97316" opacity=".28"/>
        <rect x="0" y="164" width="65" height="118" rx="12" fill="#f97316" opacity=".88"/>
        <text x="19" y="43" class="chip" fill="#fff">P0</text>
        <text x="19" y="125" class="chip" fill="#fff">G0</text>
        <text x="19" y="229" class="chip" fill="#fff">O0</text>
      </g>
      <g transform="translate(160 28)">
        <rect x="0" y="0" width="130" height="70" rx="12" fill="#2563eb" opacity=".28"/>
        <rect x="65" y="0" width="65" height="70" rx="12" fill="#2563eb" opacity=".88"/>
        <rect x="0" y="82" width="130" height="70" rx="12" fill="#16a34a" opacity=".28"/>
        <rect x="65" y="82" width="65" height="70" rx="12" fill="#16a34a" opacity=".88"/>
        <rect x="0" y="164" width="130" height="118" rx="12" fill="#f97316" opacity=".28"/>
        <rect x="65" y="164" width="65" height="118" rx="12" fill="#f97316" opacity=".88"/>
        <text x="84" y="43" class="chip" fill="#fff">P1</text>
        <text x="84" y="125" class="chip" fill="#fff">G1</text>
        <text x="84" y="229" class="chip" fill="#fff">O1</text>
      </g>
    </g>
  </g>

  <g transform="translate(90 824)">
    <rect x="0" y="-28" width="24" height="24" rx="6" fill="#2563eb" opacity=".78"/>
    <text x="36" y="-9" class="label">P 参数</text>
    <rect x="150" y="-28" width="24" height="24" rx="6" fill="#16a34a" opacity=".78"/>
    <text x="186" y="-9" class="label">G 梯度</text>
    <rect x="300" y="-28" width="24" height="24" rx="6" fill="#f97316" opacity=".78"/>
    <text x="336" y="-9" class="label">O 优化器状态</text>
    <text x="560" y="-9" class="small">浅色表示该 rank 不常驻完整副本；深色表示本地持有分片。</text>
  </g>
</svg>
